<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Portal Account — GreenScape Pro</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#2D6A4F',
              hover: '#1B4332',
            },
            secondary: {
              DEFAULT: '#B7832A',
              hover: '#8B6320',
            },
            surface: 'var(--color-surface)',
            customBg: 'var(--color-bg)',
            textPrimary: 'var(--color-text-primary)',
            textSecondary: 'var(--color-text-secondary)',
            customBorder: 'var(--color-border)',
          },
          fontFamily: {
            heading: ['Playfair Display', 'serif'],
            body: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <script src="../assets/js/main.js" defer></script>
</head>
<body class="bg-customBg text-textPrimary font-body min-h-screen flex flex-col relative overflow-x-hidden transition-colors duration-300">

  <!-- Ambient background decorative glows (contained inside wrapper to prevent mobile overflow) -->
  <div class="absolute inset-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
    <div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-primary/5 rounded-full filter blur-[100px]"></div>
    <div class="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-secondary/5 rounded-full filter blur-[100px]"></div>
  </div>

  <!-- Header Section (Logo + Toggles) -->
  <header class="w-full max-w-7xl mx-auto flex items-center justify-between px-6 py-6 shrink-0">
    <!-- Standardized Logo -->
    <a href="index.html" class="flex items-center gap-2 group">
      <img src="../assets/images/logo.svg" alt="GreenScape Pro" class="w-8 h-8">
      <span class="font-heading font-bold text-2xl text-primary tracking-wide whitespace-nowrap">GreenScape<span class="text-secondary">Pro</span></span>
    </a>

    <!-- Top Toggles -->
    <div class="flex items-center gap-3">
      <!-- Theme Toggle -->
      <button class="theme-toggle p-2.5 rounded-full bg-surface border border-customBorder text-textSecondary hover:text-primary hover:shadow-md transition-colors" title="Toggle Light/Dark Mode">
        <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
        <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
      </button>

      <!-- RTL Toggle -->
      <button class="rtl-toggle px-3 py-2 rounded-md bg-surface border border-customBorder text-textSecondary font-bold text-xs hover:text-primary hover:shadow-md transition-colors" title="Toggle Direction">
        <span class="rtl-toggle-text-rtl">RTL</span>
        <span class="rtl-toggle-text-ltr">LTR</span>
      </button>
    </div>
  </header>

  <!-- Central Card -->
  <main class="flex-grow flex items-center justify-center px-6 py-8">
    <div class="relative w-full max-w-md bg-surface border border-customBorder rounded-2xl p-8 sm:p-10 shadow-xl space-y-6">
      
      <div class="text-center space-y-2">
        <h1 class="font-heading font-bold text-3xl text-textPrimary leading-tight">Create Account</h1>
        <p class="text-xs text-textSecondary">Register a new client portal account</p>
      </div>

      <!-- Signup Form -->
      <form class="space-y-4" onsubmit="event.preventDefault(); window.location.href='login.html';">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-[10px] font-bold uppercase text-textSecondary tracking-wider mb-1.5">First Name</label>
            <input type="text" required placeholder="John" class="w-full p-3 border border-customBorder rounded-lg bg-customBg text-textPrimary text-sm focus:outline-none focus:border-primary transition-colors duration-200">
          </div>
          <div>
            <label class="block text-[10px] font-bold uppercase text-textSecondary tracking-wider mb-1.5">Last Name</label>
            <input type="text" required placeholder="Doe" class="w-full p-3 border border-customBorder rounded-lg bg-customBg text-textPrimary text-sm focus:outline-none focus:border-primary transition-colors duration-200">
          </div>
        </div>
        <div>
          <label class="block text-[10px] font-bold uppercase text-textSecondary tracking-wider mb-1.5">Email Address</label>
          <input type="email" required placeholder="name@domain.com" class="w-full p-3 border border-customBorder rounded-lg bg-customBg text-textPrimary text-sm focus:outline-none focus:border-primary transition-colors duration-200">
        </div>
        <div>
          <label class="block text-[10px] font-bold uppercase text-textSecondary tracking-wider mb-1.5">Password</label>
          <div class="relative">
            <input type="password" required id="signup-password" placeholder="••••••••" class="w-full p-3 pr-10 rtl:pr-3 rtl:pl-10 border border-customBorder rounded-lg bg-customBg text-textPrimary text-sm focus:outline-none focus:border-primary transition-colors duration-200">
            <button type="button" onclick="(function(btn){ const p = document.getElementById('signup-password'); const show = p.type === 'password'; p.type = show ? 'text' : 'password'; btn.querySelector('.eye-icon').classList.toggle('hidden', show); btn.querySelector('.eye-off-icon').classList.toggle('hidden', !show); })(this)" class="absolute right-3 rtl:right-auto rtl:left-3 top-1/2 -translate-y-1/2 text-textSecondary hover:text-primary transition-colors flex items-center justify-center">
              <i data-lucide="eye" class="eye-icon w-4 h-4"></i>
              <i data-lucide="eye-off" class="eye-off-icon w-4 h-4 hidden"></i>
            </button>
          </div>
        </div>
        <div>
          <label class="block text-[10px] font-bold uppercase text-textSecondary tracking-wider mb-1.5">Confirm Password</label>
          <div class="relative">
            <input type="password" required id="signup-confirm-password" placeholder="••••••••" class="w-full p-3 pr-10 rtl:pr-3 rtl:pl-10 border border-customBorder rounded-lg bg-customBg text-textPrimary text-sm focus:outline-none focus:border-primary transition-colors duration-200">
            <button type="button" onclick="(function(btn){ const p = document.getElementById('signup-confirm-password'); const show = p.type === 'password'; p.type = show ? 'text' : 'password'; btn.querySelector('.eye-icon').classList.toggle('hidden', show); btn.querySelector('.eye-off-icon').classList.toggle('hidden', !show); })(this)" class="absolute right-3 rtl:right-auto rtl:left-3 top-1/2 -translate-y-1/2 text-textSecondary hover:text-primary transition-colors flex items-center justify-center">
              <i data-lucide="eye" class="eye-icon w-4 h-4"></i>
              <i data-lucide="eye-off" class="eye-off-icon w-4 h-4 hidden"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="w-full py-3.5 bg-primary hover:bg-primary-hover text-white font-bold rounded-lg shadow-md transition-colors duration-200">Create My Account</button>
      </form>

      <div class="relative flex items-center justify-center py-2">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-customBorder"></div>
        </div>
        <span class="relative bg-surface px-3 text-[10px] text-textSecondary uppercase tracking-wider">or sign up with</span>
      </div>

      <!-- Social Sign In (3 options with SVGs) -->
      <div class="grid grid-cols-3 gap-3">
        <button type="button" class="flex flex-col sm:flex-row items-center justify-center gap-1.5 py-2 px-1 border border-customBorder rounded-xl bg-customBg text-[11px] sm:text-xs font-semibold hover:bg-surface hover:border-primary hover:text-primary transition-all duration-300">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Google</span>
        </button>
        <button type="button" class="flex flex-col sm:flex-row items-center justify-center gap-1.5 py-2 px-1 border border-customBorder rounded-xl bg-customBg text-[11px] sm:text-xs font-semibold hover:bg-surface hover:border-primary hover:text-primary transition-all duration-300">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.2.67-2.92 1.49-.62.71-1.16 1.85-1.01 2.96 1.12.09 2.27-.58 2.94-1.39z"/>
          </svg>
          <span>Apple</span>
        </button>
        <button type="button" class="flex flex-col sm:flex-row items-center justify-center gap-1.5 py-2 px-1 border border-customBorder rounded-xl bg-customBg text-[11px] sm:text-xs font-semibold hover:bg-surface hover:border-primary hover:text-primary transition-all duration-300">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.577.688.479C19.138 20.162 22 16.418 22 12c0-5.523-4.523-10-10-10z"/>
          </svg>
          <span>GitHub</span>
        </button>
      </div>

      <div class="text-center text-xs text-textSecondary pt-2">
        Already have an account? <a href="login.html" class="text-primary font-bold hover:underline">Login</a>
      </div>

    </div>
  </main>

</body>
</html>
