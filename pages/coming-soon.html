<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon — GreenScape Pro</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#2D6A4F',
              hover: '#1B4332',
            },
            secondary: {
              DEFAULT: '#B7832A',
              hover: '#8B6320',
            },
            surface: 'var(--color-surface)',
            customBg: 'var(--color-bg)',
            textPrimary: 'var(--color-text-primary)',
            textSecondary: 'var(--color-text-secondary)',
            customBorder: 'var(--color-border)',
          },
          fontFamily: {
            heading: ['Playfair Display', 'serif'],
            body: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" id="rtl-stylesheet" href="../assets/css/rtl.css" disabled>
  
  <!-- Custom JS -->
  <script src="../assets/js/main.js" defer></script>
</head>
<body class="bg-customBg text-textPrimary font-body min-h-screen flex flex-col relative overflow-x-hidden transition-colors duration-300">

  <!-- Ambient background decorative glows -->
  <div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-primary/5 rounded-full filter blur-[100px] -z-10 pointer-events-none"></div>
  <div class="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-secondary/5 rounded-full filter blur-[100px] -z-10 pointer-events-none"></div>

  <!-- Header Section (Logo + Toggles) -->
  <header class="w-full max-w-7xl mx-auto flex items-center justify-between px-6 py-6 shrink-0">
    <!-- Standardized Logo -->
    <a href="index.html" class="flex items-center gap-2 group">
      <img src="../assets/images/logo.svg" alt="GreenScape Pro" class="w-8 h-8">
      <span class="font-heading font-bold text-2xl text-primary tracking-wide whitespace-nowrap">GreenScape<span class="text-secondary">Pro</span></span>
    </a>

    <!-- Top Toggles -->
    <div class="flex items-center gap-3">
      <!-- Theme Toggle -->
      <button class="theme-toggle p-2.5 rounded-full bg-surface border border-customBorder text-textSecondary hover:text-primary hover:shadow-md transition-colors" title="Toggle Light/Dark Mode">
        <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
        <i data-lucide="sun" class="w-5 h-5 hidden dark:block text-yellow-500"></i>
      </button>

      <!-- RTL Toggle -->
      <button class="rtl-toggle px-3 py-2 rounded-md bg-surface border border-customBorder text-textSecondary font-bold text-xs hover:text-primary hover:shadow-md transition-colors" title="Toggle Direction">
        <span class="rtl-toggle-text-rtl">RTL</span>
        <span class="rtl-toggle-text-ltr">LTR</span>
      </button>
    </div>
  </header>

  <!-- Central Card -->
  <main class="flex-grow flex items-center justify-center px-6 py-8">
    <div class="text-center space-y-6 max-w-lg w-full bg-surface border border-customBorder rounded-2xl p-8 sm:p-10 shadow-md hover:shadow-lg transition-all duration-300">
      
      <h1 class="font-heading text-4xl sm:text-5xl font-bold leading-tight text-textPrimary">New Layouts Blooming Soon!</h1>
      <p class="text-textSecondary text-xs sm:text-sm leading-relaxed font-light">
        We are renovating our online portal catalog. Subscribe to be notified when the custom dashboard goes live.
      </p>

      <!-- Static Countdown Timer -->
      <div class="grid grid-cols-4 gap-4 max-w-xs mx-auto py-4">
        <div class="bg-customBg p-3 rounded-lg border border-customBorder">
          <div class="text-xl sm:text-2xl font-bold text-primary">12</div>
          <div class="text-[10px] text-textSecondary uppercase font-bold tracking-wider">Days</div>
        </div>
        <div class="bg-customBg p-3 rounded-lg border border-customBorder">
          <div class="text-xl sm:text-2xl font-bold text-primary">08</div>
          <div class="text-[10px] text-textSecondary uppercase font-bold tracking-wider">Hours</div>
        </div>
        <div class="bg-customBg p-3 rounded-lg border border-customBorder">
          <div class="text-xl sm:text-2xl font-bold text-primary">45</div>
          <div class="text-[10px] text-textSecondary uppercase font-bold tracking-wider">Mins</div>
        </div>
        <div class="bg-customBg p-3 rounded-lg border border-customBorder">
          <div class="text-xl sm:text-2xl font-bold text-primary">19</div>
          <div class="text-[10px] text-textSecondary uppercase font-bold tracking-wider">Secs</div>
        </div>
      </div>

      <!-- Email Signup -->
      <form class="flex gap-2" onsubmit="event.preventDefault(); alert('Subscribed!')">
        <input type="email" required placeholder="john@example.com" class="flex-grow p-3 border border-customBorder rounded-lg bg-customBg text-textPrimary text-xs focus:outline-none focus:border-primary">
        <button type="submit" class="h-11 px-5 bg-primary text-white font-bold rounded-lg shadow-md hover:bg-primary-hover transition-colors text-xs flex items-center justify-center">Notify Me</button>
      </form>
    </div>
  </main>

  <!-- Clean footer space/credit to balance the page -->
  <div class="w-full text-center py-6 shrink-0 text-[10px] text-textSecondary tracking-wider uppercase font-light">
    &copy; 2026 GreenScape Pro. Designed for Premium Gardens.
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
